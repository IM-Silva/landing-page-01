<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigada!</title>
    <link rel="icon" type="image/png" sizes="32x32" href="midia/my_icon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="midia/my_icon.png">
    <link rel="apple-touch-icon" href="midia/my_icon.png">
    <link rel="shortcut icon" href="midia/my_icon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Unica+One&display=swap" rel="stylesheet">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Unica One",sans-serif;
            scroll-behavior: smooth;
        }
        body{
            height: 100vh;
            background-color: #e0e1d3;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            width: 90%;
            height: 80%;
            background-color: #225b3f;
            border-radius: 180px 5px;
            color: #e0e1d3;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .content{
            width: 90%;
            height: 80%;
            background-color: #df5428;
            border-radius: 180px 5px;
            color: #e0e1d3;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .conteudo{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 40px;
        }
        .conteudo h2 {
            font-size: 2.5rem;
            text-shadow: 0 0 15px #fff;
        }          
        .btn-voltar{
            text-decoration: none;
            background-color: #e0e1d3;
            color: #212121;
            padding: 15px 30px;
            border-radius: 20px 5px;
            transition: all 1s;
            font-size: 1.5rem;
        }
        .btn-voltar:hover{
            background-color: #212121;
            color:#e0e1d3 ;
            transform: scale(1.05);
        }
        @media (max-width:768px){
            .container{
                width: 80%;
                height: 70%;
                border-radius: 50px 5px;
            }
            .content{
                width: 95%;
                height: 90%;
                border-radius: 60px 5px;
            }
            .conteudo{
                gap: 10px;
                padding: 20px;
            }
            .conteudo h2{
                width: 100%;
                font-size: 1rem;
                padding: 10px;
            }
            .conteudo .btn-voltar{
                font-size: 0.9rem;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="conteudo">
                <h2>🎉 Que alegria ter você com a gente! 🎊</h2>
                <p>Seu cadastro foi iniciado com sucesso.<br>
                Logo logo vai chegar um e-mail para você finalizar sua assinatura e já ir se preparando para brilhar na avenida. Fique de olho na caixa de entrada (e na aba de spam também)! 💌👕</p>
                <a href="mini_projeto.html" class="btn-voltar" >Voltar</a>
            </div>
        </div>
    </div>
</body>
</html>
